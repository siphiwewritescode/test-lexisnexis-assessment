services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lexisnexis_assessment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexisnexis_assessment"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lexisnexis_assessment
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
